<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; min-height: 100vh;
  background: #050510;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #b0b4cc;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.page {
  max-width: 600px;
  width: 100%;
  padding: 40px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
}
.logo {
  font-size: 48px;
  margin-bottom: 4px;
}
h1 {
  font-size: 24px;
  font-weight: 700;
  color: #8ac4ff;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.tagline {
  color: #556688;
  font-size: 13px;
  margin-bottom: 32px;
}

/* Game card */
.game-card {
  width: 100%;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 28px;
  text-align: center;
  transition: border-color 0.3s, background 0.3s;
  cursor: pointer;
  text-decoration: none;
  display: block;
}
.game-card:hover {
  border-color: rgba(138, 196, 255, 0.3);
  background: rgba(255,255,255,0.04);
}
.game-card h2 {
  font-size: 20px;
  color: #8ac4ff;
  margin-bottom: 6px;
}
.game-card .desc {
  font-size: 14px;
  color: #6a7a9a;
  margin-bottom: 12px;
}
.game-card .play-btn {
  display: inline-block;
  background: linear-gradient(135deg, #2a4a8a, #3a6ac4);
  color: #fff;
  padding: 8px 28px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
}
.game-card:hover .play-btn {
  background: linear-gradient(135deg, #3a5aaa, #4a7ad4);
}
.game-icon {
  font-size: 40px;
  margin-bottom: 12px;
}

/* AdSense below card */
.ad-wrapper {
  width: 100%;
  display: flex;
  justify-content: center;
  min-height: 90px;
  margin-top: 24px;
  background: rgba(255,255,255,0.01);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 8px;
  overflow: hidden;
}

/* Divider */
.divider {
  color: #334466;
  font-size: 12px;
  margin: 24px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
}
.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.05);
}

/* Footer */
.footer {
  margin-top: auto;
  padding: 20px 0 24px;
  font-size: 12px;
  color: #445577;
  display: flex;
  gap: 12px;
  align-items: center;
}
.footer a {
  color: #556699;
  text-decoration: none;
}
.footer a:hover { color: #7788bb; }
</style>

<div class="page">

  <div class="logo">🚀</div>
  <h1>Patison's Game Portal</h1>

    <span class="play-btn">▶ Play Now</span>
  </a>

  <!-- AdSense Banner 728x90 -->

    <span>Made with ♥</span>

</div>
